name: Keep Render Warm

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Ping health endpoint
        run: |
          curl -sf --max-time 60 \
            "${{ secrets.RENDER_HEALTH_URL || 'https://off-campus-club.vercel.app/api/health' }}" \
            || echo "Health check returned non-zero (server may be waking)"
